# .github/workflows/publish.yml — Aiden v4.0.0 (Phase 20 Task 4)
#
# Publish to npm on a git tag. Two channels:
#   - v4.x.y-beta.N    →  npm dist-tag `beta`   (pre-release)
#   - v4.x.y           →  npm dist-tag `latest` (stable)
#
# Pipeline:
#   1. Checkout, set up Node 20, npm ci
#   2. tsc --noEmit  (catches type drift before publish)
#   3. vitest run    (full unit suite, no live-API legs)
#   4. npm publish   (--tag beta for pre, --tag latest for stable)
#   5. Create GitHub release with auto-generated changelog from commits
#
# Secret required: NPM_TOKEN — npm automation token with publish access
# to `aiden-runtime`. Configure under Settings → Secrets → Actions.
#
# Hermes reference: hermes-agent has no npm/PyPI publish workflow (it
# distributes via Docker + Nix). This is an Aiden-specific surface — see
# docs/sprint/hermes-license-pipeline-audit.md § "Versioning + registry
# publish".

name: publish

on:
  push:
    tags:
      - 'v4.*.*-beta.*'
      - 'v4.*.*'

# Single in-flight publish per tag. Re-pushing a tag (force) cancels the
# stale run before npm publish gets a chance to fail with "already exists".
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create the GitHub release
      id-token: write  # for npm provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the changelog generator can walk back to the
          # previous tag. Default fetch-depth=1 misses prior commits.
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'
          # Use cache to speed up the install on retries.
          cache: 'npm'

      - name: Install dependencies (frozen lockfile)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
        env:
          # Same env discipline as ci.yml — no live-API legs in publish path.
          AIDEN_LIVE_OAUTH: ''
          AIDEN_LIVE_SMOKE: ''
          AIDEN_TOKEN_KEY: 'ci-deterministic-key-do-not-use-in-prod'
          AIDEN_MACHINE_KEY: 'ci-deterministic-machine-key'

      - name: Verify package.json version matches the git tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Verified: tag and package.json both at $PKG_VERSION"

      - name: Build
        run: npm run build

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          if [[ "$GITHUB_REF" == *"-beta."* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --tag ${{ steps.dist-tag.outputs.tag }} --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # auto-generated changelog walks commits since the previous tag
          generate_release_notes: true
          # Mark beta tags as pre-release so users on the stable channel
          # don't get them surfaced by `gh release latest`.
          prerelease: ${{ contains(github.ref, '-beta.') }}
          name: 'Aiden v${{ github.ref_name }}'
          body: |
            ## Aiden ${{ github.ref_name }}

            Published to [npm](https://www.npmjs.com/package/aiden-runtime) on the `${{ steps.dist-tag.outputs.tag }}` dist-tag.

            Install:
            ```
            npm install -g aiden-runtime@${{ steps.dist-tag.outputs.tag }}
            ```

            See the auto-generated commit list below for what changed.
